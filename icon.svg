<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="image-rendering:pixelated">

  <!-- Base silver -->
  <rect width="32" height="32" fill="#c0c0c0"/>

  <!-- Win95 raised bevel -->
  <rect x="0" y="0"  width="32" height="1"  fill="#ffffff"/>
  <rect x="0" y="0"  width="1"  height="32" fill="#ffffff"/>
  <rect x="0" y="31" width="32" height="1"  fill="#000000"/>
  <rect x="31" y="0" width="1"  height="32" fill="#000000"/>
  <rect x="1" y="30" width="30" height="1"  fill="#808080"/>
  <rect x="30" y="1" width="1"  height="29" fill="#808080"/>

  <!-- Screen: sunken inset -->
  <rect x="3" y="3"  width="26" height="24" fill="#808080"/>
  <rect x="3" y="3"  width="26" height="1"  fill="#404040"/>
  <rect x="3" y="3"  width="1"  height="24" fill="#404040"/>
  <rect x="3" y="26" width="26" height="1"  fill="#ffffff"/>
  <rect x="28" y="3" width="1"  height="24" fill="#ffffff"/>
  <rect x="4" y="4"  width="24" height="22" fill="#000000"/>

  <!-- ♪ pixel art (green, top-left of screen) -->
  <!-- stem -->
  <rect x="10" y="6"  width="1" height="6" fill="#00ff00"/>
  <!-- flag -->
  <rect x="11" y="6"  width="2" height="1" fill="#00ff00"/>
  <rect x="12" y="7"  width="1" height="1" fill="#00ff00"/>
  <!-- note head (oval: 3×2) -->
  <rect x="8"  y="11" width="3" height="1" fill="#00ff00"/>
  <rect x="8"  y="12" width="2" height="1" fill="#00ff00"/>

  <!-- "82.8" — pixel font, 3×5 each digit, 1px gap, green -->

  <!-- digit "8" x=6 y=17 -->
  <rect x="6"  y="17" width="3" height="1" fill="#00ff00"/>
  <rect x="6"  y="18" width="1" height="1" fill="#00ff00"/>
  <rect x="8"  y="18" width="1" height="1" fill="#00ff00"/>
  <rect x="6"  y="19" width="3" height="1" fill="#00ff00"/>
  <rect x="6"  y="20" width="1" height="1" fill="#00ff00"/>
  <rect x="8"  y="20" width="1" height="1" fill="#00ff00"/>
  <rect x="6"  y="21" width="3" height="1" fill="#00ff00"/>

  <!-- digit "2" x=10 y=17 -->
  <rect x="10" y="17" width="3" height="1" fill="#00ff00"/>
  <rect x="12" y="18" width="1" height="1" fill="#00ff00"/>
  <rect x="10" y="19" width="3" height="1" fill="#00ff00"/>
  <rect x="10" y="20" width="1" height="1" fill="#00ff00"/>
  <rect x="10" y="21" width="3" height="1" fill="#00ff00"/>

  <!-- dot "." x=14 y=21 -->
  <rect x="14" y="21" width="1" height="1" fill="#00ff00"/>

  <!-- digit "8" x=16 y=17 -->
  <rect x="16" y="17" width="3" height="1" fill="#00ff00"/>
  <rect x="16" y="18" width="1" height="1" fill="#00ff00"/>
  <rect x="18" y="18" width="1" height="1" fill="#00ff00"/>
  <rect x="16" y="19" width="3" height="1" fill="#00ff00"/>
  <rect x="16" y="20" width="1" height="1" fill="#00ff00"/>
  <rect x="18" y="20" width="1" height="1" fill="#00ff00"/>
  <rect x="16" y="21" width="3" height="1" fill="#00ff00"/>

  <!-- taskbar strip: Win95 bottom -->
  <rect x="0" y="28" width="32" height="4" fill="#c0c0c0"/>
  <rect x="0" y="28" width="32" height="1" fill="#808080"/>
  <rect x="0" y="28" width="1"  height="4" fill="#ffffff"/>

</svg>
